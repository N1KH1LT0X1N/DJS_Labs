<!DOCTYPE html>
<html>
<head>

    <style>
        body { font-family: Arial; margin: 20px; }

        img { max-width: 100%; height: auto; border: 1px solid #ddd; margin: 10px 0; }
        .image-info { font-size: 12px; color: #666; }

<body>
    <h1>Reference Images from Docx Files</h1>

        <h3>Image 2 (Large)</h3>

        <h3>Image 4</h3>

        <h3>Image 5</h3>
        <img src="lab1/images/image5.jpeg" alt="Lab 1 - Image 5">
        
        <h3>Image 7</h3>
        <img src="lab1/images/image7.jpeg" alt="Lab 1 - Image 7">
    </div>
    
    <div class="image-section">
        <h2>LAB 2 - Reference Images</h2>
        <p>These are the mockups for what your Lab 2 websites should look like</p>
        <h3>Image 1</h3>
        <img src="lab2/images/image1.png" alt="Lab 2 - Image 1">
