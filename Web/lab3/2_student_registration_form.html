<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 1em;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .radio-group,
        .checkbox-group {
            margin: 10px 0;
        }

        .radio-group label,
        .checkbox-group label {
            display: inline-block;
            margin-right: 20px;
            margin-bottom: 10px;
            font-weight: 400;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .error {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .form-group.invalid input,
        .form-group.invalid textarea {
            border-color: #e74c3c;
            background-color: #fadbd8;
        }

        .form-group.invalid .error {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn {
            background-color: #27ae60;
            color: white;
            flex: 1;
        }

        .submit-btn:hover {
            background-color: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        .reset-btn {
            background-color: #95a5a6;
            color: white;
            flex: 1;
        }

        .reset-btn:hover {
            background-color: #7f8c8d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(149, 165, 166, 0.3);
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #c3e6cb;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Registration Form</h1>
        <div class="success-message" id="successMessage">
            ✓ Form submitted successfully!
        </div>
        
        <form id="registrationForm" onsubmit="handleSubmit(event)">
            <!-- First Name -->
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" placeholder="Enter your first name">
                <span class="error" id="firstNameError">First name is required</span>
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" placeholder="Enter your last name">
                <span class="error" id="lastNameError">Last name is required</span>
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="female"> Female
                    </label>
                    <label>
                        <input type="radio" name="gender" value="male"> Male
                    </label>
                </div>
                <span class="error" id="genderError">Please select a gender</span>
            </div>

            <!-- Date of Birth -->
            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob">
                <span class="error" id="dobError">Please select a valid date of birth</span>
            </div>

            <!-- Email ID -->
            <div class="form-group">
                <label for="email">Email ID</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error" id="emailError">Please enter a valid email address</span>
            </div>

            <!-- Alternative Email -->
            <div class="form-group">
                <label for="altEmail">Alternative Email ID</label>
                <input type="email" id="altEmail" name="altEmail" placeholder="Enter alternative email (optional)">
                <span class="error" id="altEmailError">Please enter a valid email address</span>
            </div>

            <!-- Interests -->
            <div class="form-group">
                <label>Interest</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="interest" value="swimming"> Swimming
                    </label>
                    <label>
                        <input type="checkbox" name="interest" value="reading"> Reading
                    </label>
                    <label>
                        <input type="checkbox" name="interest" value="painting"> Painting
                    </label>
                    <label>
                        <input type="checkbox" name="interest" value="music"> Music
                    </label>
                </div>
            </div>

            <!-- About Yourself -->
            <div class="form-group">
                <label for="aboutYourself">About Yourself</label>
                <textarea id="aboutYourself" name="aboutYourself" placeholder="Tell us about yourself..."></textarea>
                <span class="error" id="aboutError">About section is required</span>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="submit-btn">Submit</button>
                <button type="reset" class="reset-btn">Reset</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const successMessage = document.getElementById('successMessage');

        function validateForm() {
            let isValid = true;
            const formGroups = form.querySelectorAll('.form-group');
            
            // Clear previous error states
            formGroups.forEach(group => {
                group.classList.remove('invalid');
            });

            // Validate First Name
            const firstName = document.getElementById('firstName').value.trim();
            if (firstName === '') {
                markInvalid('firstName', 'firstNameError');
                isValid = false;
            }

            // Validate Last Name
            const lastName = document.getElementById('lastName').value.trim();
            if (lastName === '') {
                markInvalid('lastName', 'lastNameError');
                isValid = false;
            }

            // Validate Gender
            const genderChecked = document.querySelector('input[name="gender"]:checked');
            if (!genderChecked) {
                const genderGroup = document.querySelector('input[name="gender"]').closest('.form-group');
                genderGroup.classList.add('invalid');
                isValid = false;
            }

            // Validate Date of Birth
            const dob = document.getElementById('dob').value;
            if (dob === '') {
                markInvalid('dob', 'dobError');
                isValid = false;
            } else {
                const dobDate = new Date(dob);
                const today = new Date();
                if (dobDate >= today) {
                    document.getElementById('dobError').textContent = 'Date of birth must be in the past';
                    markInvalid('dob', 'dobError');
                    isValid = false;
                }
            }

            // Validate Email
            const email = document.getElementById('email').value.trim();
            if (!isValidEmail(email)) {
                markInvalid('email', 'emailError');
                isValid = false;
            }

            // Validate Alternative Email (optional but if provided must be valid)
            const altEmail = document.getElementById('altEmail').value.trim();
            if (altEmail !== '' && !isValidEmail(altEmail)) {
                markInvalid('altEmail', 'altEmailError');
                isValid = false;
            }

            // Validate About Yourself
            const about = document.getElementById('aboutYourself').value.trim();
            if (about === '') {
                markInvalid('aboutYourself', 'aboutError');
                isValid = false;
            }

            return isValid;
        }

        function markInvalid(fieldId, errorId) {
            const field = document.getElementById(fieldId);
            const group = field.closest('.form-group');
            group.classList.add('invalid');
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function handleSubmit(event) {
            event.preventDefault();

            if (validateForm()) {
                // Show success message
                successMessage.classList.add('show');
                
                // Collect form data
                const formData = new FormData(form);
                const interests = form.querySelectorAll('input[name="interest"]:checked');
                const interestValues = Array.from(interests).map(i => i.value);

                const data = {
                    firstName: formData.get('firstName'),
                    lastName: formData.get('lastName'),
                    gender: formData.get('gender'),
                    dateOfBirth: formData.get('dob'),
                    email: formData.get('email'),
                    altEmail: formData.get('altEmail'),
                    interests: interestValues,
                    about: formData.get('aboutYourself')
                };

                console.log('Form Data:', data);

                // Reset form after 2 seconds
                setTimeout(() => {
                    form.reset();
                    successMessage.classList.remove('show');
                }, 2000);
            }
        }

        // Real-time validation on input
        document.getElementById('firstName').addEventListener('blur', function() {
            if (this.value.trim() === '') {
                this.closest('.form-group').classList.add('invalid');
            } else {
                this.closest('.form-group').classList.remove('invalid');
            }
        });

        document.getElementById('lastName').addEventListener('blur', function() {
            if (this.value.trim() === '') {
                this.closest('.form-group').classList.add('invalid');
            } else {
                this.closest('.form-group').classList.remove('invalid');
            }
        });

        document.getElementById('email').addEventListener('blur', function() {
            if (!isValidEmail(this.value.trim())) {
                this.closest('.form-group').classList.add('invalid');
            } else {
                this.closest('.form-group').classList.remove('invalid');
            }
        });

        document.getElementById('altEmail').addEventListener('blur', function() {
            if (this.value.trim() !== '' && !isValidEmail(this.value.trim())) {
                this.closest('.form-group').classList.add('invalid');
            } else {
                this.closest('.form-group').classList.remove('invalid');
            }
        });

        document.getElementById('aboutYourself').addEventListener('blur', function() {
            if (this.value.trim() === '') {
                this.closest('.form-group').classList.add('invalid');
            } else {
                this.closest('.form-group').classList.remove('invalid');
            }
        });
    </script>
</body>
</html>
